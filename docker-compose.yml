services:
  db:
    image: timescale/timescaledb-ha:pg17
    container_name: ravanshenasi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ravanshenasi_dev
    ports:
      - "5432:5432"
    volumes:
      - ravanshenasi_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ravanshenasi_pgdata:
